{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h1>Welcome to the Dating Site 💚</h1>
    <p>This is your home page.</p>
    {% if user.is_authenticated %}
      <p>You are logged in. Use the menu to log out.</p>
    {% else %}
      <p><a href="{% url 'signup' %}">Sign up</a> or <a href="{% url 'login' %}">Log in</a></p>
    {% endif %}
  </div>
{% endblock %}
